<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上尾+α ポータル｜ラーメン・中華特集</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
:root {
  --fg: #0a0a0a; --fg-2: #525252; --fg-3: #a3a3a3;
  --border: #e5e5e5; --bg: #fafafa; --white: #ffffff;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--fg);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── TOP BAR ── */
.top-bar {
  border-bottom: 1px solid var(--border);
  background: var(--white);
}
.top-bar-inner {
  max-width: 1200px; margin: 0 auto;
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.top-bar a { font-size: 14px; font-weight: 700; color: var(--fg); text-decoration: none; letter-spacing: -0.5px; }
.top-bar span { font-size: 13px; color: var(--fg-3); }

/* ── HEADER ── */
.site-header {
  background: var(--white);
  padding: 24px 24px 20px;
  border-bottom: 1px solid var(--border);
}
.header-inner { max-width: 1200px; margin: 0 auto; }
.header-top { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
.logo { display: none; }
.site-title h1 { font-size: 24px; font-weight: 700; color: var(--fg); letter-spacing: -0.8px; }
.site-title p  { font-size: 13px; color: var(--fg-3); margin-top: 4px; }
.header-badge {
  margin-left: auto;
  background: var(--bg); color: var(--fg-3);
  border: 1px solid var(--border);
  padding: 5px 12px; border-radius: 6px;
  font-size: 11px; font-weight: 600;
}

/* Search bar */
.search-wrap { position: relative; margin-bottom: 14px; }
.search-wrap input {
  width: 100%; padding: 10px 16px 10px 40px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--fg);
  font-family: 'Inter', sans-serif;
  font-size: 14px; outline: none;
  transition: border-color .15s;
}
.search-wrap input::placeholder { color: var(--fg-3); }
.search-wrap input:focus { border-color: var(--fg-3); }
.search-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  font-size: 14px; pointer-events: none; color: var(--fg-3);
}

/* Category nav */
.cat-nav { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
.cat-nav::-webkit-scrollbar { display: none; }
.cat-btn {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--white); color: var(--fg-2);
  font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 600; cursor: pointer;
  transition: all .15s;
}
.cat-btn:hover { border-color: var(--fg-3); color: var(--fg); }
.cat-btn.active { background: var(--fg); border-color: var(--fg); color: var(--white); }
.cat-btn .cnt {
  background: var(--bg); color: var(--fg-3);
  padding: 1px 7px; border-radius: 4px; font-size: 10px;
}
.cat-btn.active .cnt { background: rgba(255,255,255,.2); color: #fff; }

/* ── MAIN ── */
.main { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }

/* Section header */
.section-hdr {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 18px;
}
.section-hdr h2 {
  font-size: 15px; font-weight: 700; color: var(--fg);
  display: flex; align-items: center; gap: 8px;
}
.section-hdr .count {
  font-size: 12px; color: var(--fg-3); font-weight: 500;
}
.section-hdr .sort-wrap { margin-left: auto; }
.section-hdr select {
  padding: 6px 12px; border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--white); color: var(--fg-2);
  font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 600; cursor: pointer; outline: none;
}

/* Filter chips */
.filter-row {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-bottom: 22px;
}
.chip {
  padding: 6px 14px; border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--white); color: var(--fg-3);
  font-size: 12px; font-weight: 600; cursor: pointer;
  transition: all .15s;
}
.chip:hover { border-color: var(--fg-3); color: var(--fg); }
.chip.active { background: var(--fg); border-color: var(--fg); color: var(--white); }

.filter-label {
  font-size: 11px; font-weight: 600; color: var(--fg-3);
  margin: 14px 0 6px; letter-spacing: 0.5px; text-transform: uppercase;
}
.filter-label:first-of-type { margin-top: 0; }

/* ── SHOP GRID ── */
.shop-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 18px;
}

/* Shop card */
.shop-card {
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
  transition: background .15s;
  cursor: default;
}
.shop-card:hover {
  background: var(--bg);
}

/* Card hero */
.card-hero {
  height: 56px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  background: var(--bg) !important;
  position: relative; overflow: hidden;
  border-bottom: 1px solid var(--border);
}
.card-hero::after { display: none; }

/* Card body */
.card-body { padding: 16px 18px 18px; }
.card-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
.card-top h3 { font-size: 14px; font-weight: 700; color: var(--fg); flex: 1; line-height: 1.3; }
.type-badge {
  flex-shrink: 0;
  padding: 3px 10px; border-radius: 4px;
  font-size: 10px; font-weight: 600;
  background: var(--bg) !important; color: var(--fg-2) !important;
  border: 1px solid var(--border);
  white-space: nowrap;
}

/* Rating row */
.rating-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.stars { display: flex; gap: 2px; }
.star { font-size: 13px; }
.star.filled { color: var(--fg); }
.star.half   { color: var(--fg-3); }
.star.empty  { color: var(--border); }
.rating-val { font-family: 'SF Mono', 'Consolas', monospace; font-size: 13px; font-weight: 700; color: var(--fg); }
.review-cnt { font-size: 11px; color: var(--fg-3); }
.source-badge {
  margin-left: auto;
  font-size: 9px; font-weight: 600; color: var(--fg-3);
  background: var(--bg); padding: 2px 7px; border-radius: 4px;
}

/* Address */
.card-addr {
  display: flex; align-items: flex-start; gap: 6px;
  font-size: 11px; color: var(--fg-3); margin-bottom: 8px;
}
.card-addr .icon { font-size: 12px; flex-shrink: 0; margin-top: 1px; }

/* Features */
.card-features {
  font-size: 12px; color: var(--fg-2); line-height: 1.7;
  margin-bottom: 12px;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Tags */
.tag-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
.tag {
  padding: 3px 9px; border-radius: 4px;
  font-size: 10px; font-weight: 600;
  background: var(--bg) !important; color: var(--fg-3) !important;
  border: 1px solid var(--border);
}

/* Card footer */
.card-footer {
  display: flex; gap: 8px;
}
.btn-map {
  flex: 1; padding: 9px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 6px; color: var(--fg-2);
  font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 600; cursor: pointer;
  text-decoration: none; display: flex; align-items: center;
  justify-content: center; gap: 5px;
  transition: all .15s;
}
.btn-map:hover { background: var(--bg); border-color: var(--fg-3); color: var(--fg); }
.btn-fav {
  width: 38px; height: 38px;
  background: var(--white); border: 1px solid var(--border);
  border-radius: 6px; display: flex; align-items: center; justify-content: center;
  font-size: 16px; cursor: pointer; transition: background .15s;
}
.btn-fav:hover { background: var(--bg); }
.btn-fav.saved { background: #fef2f2; }

/* No results */
.no-results {
  text-align: center; padding: 60px 20px; color: var(--fg-3);
  grid-column: 1 / -1;
}
.no-results .emoji { font-size: 32px; margin-bottom: 12px; }
.no-results p { font-size: 14px; }

/* Footer note */
.data-note {
  margin-top: 32px; padding: 14px 18px;
  background: var(--white); border-radius: var(--radius);
  border: 1px solid var(--border);
  font-size: 11px; color: var(--fg-3); line-height: 1.8;
}
.data-note strong { color: var(--fg-2); }

/* Responsive */
@media (max-width: 600px) {
  .site-header { padding: 18px 16px 16px; }
  .main { padding: 20px 16px; }
  .shop-grid { grid-template-columns: 1fr; }
  .header-badge { display: none; }
}
</style>

let currentAreaFilter = 'all';
let currentTypeFilter = 'all';
let savedShops = new Set();

function setAreaFilter(f, el) {
  currentAreaFilter = f;
  document.querySelectorAll('#areaFilterRow .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  filterShops();
}

function setTypeFilter(f, el) {
  currentTypeFilter = f;
  document.querySelectorAll('#typeFilterRow .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  filterShops();
}

function renderStars(rating) {
  let html = '';
  for (let i = 1; i <= 5; i++) {
    if (rating >= i) html += '<span class="star filled">★</span>';
    else if (rating >= i - 0.5) html += '<span class="star half">★</span>';
    else html += '<span class="star empty">★</span>';
  }
  return html;
}

function buildMapUrl(query) {
  return 'https://www.google.com/maps/search/' + encodeURIComponent(query);
}

function toggleFav(id, el) {
  if (savedShops.has(id)) {
    savedShops.delete(id);
    el.classList.remove('saved');
    el.textContent = '🤍';
  } else {
    savedShops.add(id);
    el.classList.add('saved');
    el.textContent = '❤️';
  }
}

function selectCategory(cat, el) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function filterShops() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;

  let filtered = SHOPS.filter(s => {
    const matchArea = currentAreaFilter === 'all' || s.areaFilter === currentAreaFilter;
    const matchType = currentTypeFilter === 'all'
      || s.filters.includes(currentTypeFilter)
      || (currentTypeFilter === '駐車場' && s.hasParking)
      || (currentTypeFilter === '駅近' && s.nearStation);
    const matchSearch = !q || [s.name, s.features, s.type, s.address, s.area, ...s.tags]
      .some(t => t.toLowerCase().includes(q));
    return matchArea && matchType && matchSearch;
  });

  if (sort === 'rating') filtered.sort((a, b) => b.rating - a.rating);
  else if (sort === 'review') filtered.sort((a, b) => b.reviews - a.reviews);
  else filtered.sort((a, b) => a.name.localeCompare(b.name, 'ja'));

  renderCards(filtered);
  document.getElementById('result-count').textContent = filtered.length + '件';
  document.getElementById('cnt-main').textContent = filtered.length;
}

function renderCards(shops) {
  const grid = document.getElementById('shopGrid');
  if (shops.length === 0) {
    grid.innerHTML = `<div class="no-results"><div class="emoji">🔍</div><p>該当するお店が見つかりませんでした</p></div>`;
    return;
  }
  grid.innerHTML = shops.map(s => `
    <div class="shop-card">
      <div class="card-hero" style="background:${s.heroBg}">${s.hero}</div>
      <div class="card-body">
        <div class="card-top">
          <h3>${s.name}</h3>
          <span class="type-badge" style="background:${s.typeBg};color:${s.typeColor}">${s.type}</span>
        </div>
        <div class="rating-row">
          <div class="stars">${renderStars(s.rating)}</div>
          <span class="rating-val">${s.rating.toFixed(1)}</span>
          <span class="review-cnt">（${s.reviews.toLocaleString()}件）</span>
          <span class="source-badge">${s.source}</span>
        </div>
        <div class="card-addr">
          <span class="icon">📍</span>
          <span>${s.address}</span>
        </div>
        <div class="card-features">${s.features}</div>
        <div class="tag-row">
          <span class="tag" style="background:#EBF4FF;color:#1A5FAC">📍 ${s.area}</span>
          ${s.tags.map(t => `<span class="tag">${t}</span>`).join('')}
          ${s.hasParking ? '<span class="tag" style="background:#E0FBF3;color:#007A5A">🅿 駐車場</span>' : ''}
          ${s.nearStation ? '<span class="tag" style="background:#EBF4FF;color:#1A5FAC">🚃 駅近</span>' : ''}
          <span class="tag" style="background:#FFF8E6;color:#9A6A00">💴 ${s.price}</span>
        </div>
        <div class="card-footer">
          <a class="btn-map" href="${buildMapUrl(s.mapQuery)}" target="_blank" rel="noopener">
            🗺 Google Mapで見る
          </a>
          <button class="btn-fav" onclick="toggleFav(${s.id}, this)">🤍</button>
        </div>
      </div>
    </div>
  `).join('');
}

// Initial render
filterShops();
